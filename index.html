<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 技能推荐报告</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #7B68EE;
            --success-color: #10B981;
            --warning-color: #F59E0B;
            --danger-color: #EF4444;
            --bg-color: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header .timestamp {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .stat-card .label {
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .skills-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .skill-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        
        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .skill-title {
            font-size: 1.3em;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }
        
        .skill-badge {
            background: var(--success-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .skill-description {
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .skill-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
        }
        
        .meta-item .icon {
            font-size: 1.2em;
        }
        
        .skill-install {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
            color: var(--text-primary);
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .install-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .recommend-reason {
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.1), rgba(123, 104, 238, 0.1));
            border-left: 4px solid var(--primary-color);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            margin-top: 15px;
            font-size: 0.9em;
        }
        
        .recommend-reason strong {
            color: var(--primary-color);
        }
        
        .no-skills {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 12px;
        }
        
        .no-skills .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .no-skills h2 {
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .no-skills p {
            color: var(--text-secondary);
        }
        
        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .loading .spinner {
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 移动端优化 */
        @media (max-width: 640px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .stat-card .number {
                font-size: 2em;
            }
            
            .skill-card {
                padding: 20px;
            }
            
            .skill-title {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🧭 OpenClaw 技能推荐</h1>
        <div class="timestamp">生成时间：2026年03月11日 08:16:03</div>
    </header>
    
    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="number">2</div>
                <div class="label">已安装技能</div>
            </div>
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">本次推荐</div>
            </div>
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">扫描总数</div>
            </div>
        </div>
        
        <div class="skills-grid">
            
            <div class="no-skills">
                <div class="icon">🎉</div>
                <h2>暂无新推荐</h2>
                <p>您已经安装了所有推荐的技能，或者系统正在扫描中...</p>
            </div>
            
        </div>
    </div>
    
    <footer>
        <p>💡 提示：此报告每小时自动更新 | 仅推荐，不自动安装</p>
        <p style="margin-top: 10px;">Made with ❤️ for Nathaniel by xie</p>
    </footer>
</body>
</html>
